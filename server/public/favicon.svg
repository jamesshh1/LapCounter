<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#d46559"/>
  <!-- Green infield -->
  <ellipse cx="16" cy="16" rx="6" ry="4" fill="#2d802f"/>
  <!-- Lane 1 (innermost) -->
  <ellipse cx="16" cy="16" rx="8.5" ry="6" fill="none" stroke="#fff" stroke-width="1.2"/>
  <!-- Lane 2 -->
  <ellipse cx="16" cy="16" rx="10" ry="7.5" fill="none" stroke="#fff" stroke-width="1.2"/>
  <!-- Lane 3 -->
  <ellipse cx="16" cy="16" rx="11.5" ry="9" fill="none" stroke="#fff" stroke-width="1.2"/>
  <!-- Outer border -->
  <ellipse cx="16" cy="16" rx="13" ry="10.5" fill="none" stroke="#fff" stroke-width="1.5"/>
</svg>
